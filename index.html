<!DOCTYPE html>
<html lang="tl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Final Step</title>

<style>
body {
    margin:0;
    background:#111;
    color:white;
    font-family:sans-serif;
    text-align:center;
    overflow:hidden;
}

#box {
    margin-top:120px;
}

button {
    padding:15px 25px;
    font-size:18px;
    border:none;
    border-radius:10px;
    cursor:pointer;
    position:absolute;
}

#progressBar {
    width:80%;
    height:20px;
    background:#333;
    margin:20px auto;
    border-radius:10px;
    overflow:hidden;
}

#progress {
    height:100%;
    width:0%;
    background:lime;
}

#message {
    margin-top:20px;
    font-size:18px;
}
</style>
</head>

<body>

<div id="box">
    <h2>📱 Konting Click nalang!</h2>
    <p>Promise last step na to 😇</p>

    <button id="btn" onclick="nextStep()">CLICK MO AKO</button>

    <div id="progressBar">
        <div id="progress"></div>
    </div>

    <div id="message"></div>
</div>

<script>
let progress = 0;
let clicks = 0;

let messages = [
"Malapit na yan... ata 😆",
"Uy wag ka titigil 😂",
"Konting tiis pa 😭",
"Di pa sapat yan 😏",
"Grabe ka mag effort 🤣",
"System: 'Pagod na siya' 💀",
"Almost... hindi pala 😜",
"Click pa more 😈",
"HAHAHAHA di pa tapos 🤡",
"Try mo pa, baka gumana 😭"
];

function nextStep(){
    let btn = document.getElementById("btn");
    let msg = document.getElementById("message");
    let prog = document.getElementById("progress");

    clicks++;

    // Progress increases then randomly drops 😭
    progress += Math.floor(Math.random()*10)+3;

    if(progress > 90){
        progress -= Math.floor(Math.random()*40)+10; // big drop 😈
    }

    if(progress < 0) progress = 0;

    prog.style.width = progress + "%";

    msg.innerText = messages[Math.floor(Math.random()*messages.length)];

    // Button moves faster habang tumatagal
    let speed = Math.min(clicks * 2, 100);

    btn.style.left = Math.random()*80 + "%";
    btn.style.top = Math.random()*80 + "%";
    btn.style.transform = `scale(${1 + Math.random()*0.3}) rotate(${Math.random()*20 - 10}deg)`;

    // extra troll: dumadami buttons 😭
    if(clicks % 10 === 0){
        let newBtn = btn.cloneNode(true);
        newBtn.innerText = "CLICK DIN AKO 😭";
        document.body.appendChild(newBtn);
    }

    // screen shake effect
    if(clicks % 5 === 0){
        document.body.style.transform = "translate(5px,5px)";
        setTimeout(()=>{
            document.body.style.transform = "translate(0,0)";
        },100);
    }
}
</script>

</body>
</html>
